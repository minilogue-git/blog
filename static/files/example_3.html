<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>총무팀 비품 신청 리스트</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; padding: 20px; background-color: #f4f7f9; }
        .container { max-width: 500px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { color: #203B8A; border-bottom: 2px solid #203B8A; padding-bottom: 10px; }
        input { width: 70%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 10px 15px; background: #203B8A; color: white; border: none; border-radius: 4px; cursor: pointer; }
        ul { list-search-type: none; padding: 0; margin-top: 20px; }
        li { background: #eee; margin-bottom: 5px; padding: 10px; border-radius: 4px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="container">
    <h2>비품 신청 목록 (로컬 전용)</h2>
    <input type="text" id="itemInput" placeholder="신청할 비품 입력">
    <button onclick="addItem()">추가</button>
    <ul id="itemList"></ul>
</div>

<script>
    // 페이지 로드 시 기존 데이터 불러오기
    window.onload = function() {
        renderList();
    };

    function addItem() {
        const input = document.getElementById('itemInput');
        if (!input.value) return;

        // 로컬 저장소에 저장 (내 브라우저에만 저장됨)
        let items = JSON.parse(localStorage.getItem('officeItems')) || [];
        items.push(input.value);
        localStorage.setItem('officeItems', JSON.stringify(items));

        input.value = '';
        renderList();
    }

    function renderList() {
        const list = document.getElementById('itemList');
        const items = JSON.parse(localStorage.getItem('officeItems')) || [];
        list.innerHTML = items.map(item => `<li>${item}</li>`).join('');
    }
</script>

</body>
</html>
