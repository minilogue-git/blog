{{ $title := .Get "title" | default "Click to expand" }}
{{ $open := .Get "open" | default "" }}

<details class="custom-details" {{ if eq $open "true" }}open{{ end }}>
    <summary class="details-summary">
        <span class="icon"></span>
        <span class="summary-title">{{ $title }}</span>
    </summary>
    <div class="details-content">
        {{ .Inner | markdownify }}
    </div>
</details>

<style>
.custom-details {
    margin: 1rem 0;
    padding: 0;
    border: 1px solid #e1e4e8;
    border-radius: 8px;
    background-color: #ffffff;
    overflow: hidden;
    transition: all 0.3s ease;
}

.details-summary {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    background-color: #f8f9fa; /* 연한 그레이 */
    color: #203B8A; /* 신뢰감을 주는 네이비 */
    font-weight: 600;
    cursor: pointer;
    list-style: none;
    border-bottom: 1px solid transparent;
}

.details-summary::-webkit-details-marker {
    display: none;
}

.custom-details[open] .details-summary {
    border-bottom: 1px solid #e1e4e8;
    background-color: #f1f3f9; /* 오픈 시 약간 더 짙은 배경 */
}

.summary-title {
    margin-left: 10px;
}

/* 화살표 아이콘 커스텀 (이모지 버전) */
.details-summary::before {
    content: '📁'; /* 닫혀있을 때: 폴더 아이콘이나 ▶ 등을 사용 */
    margin-right: 8px;
    font-size: 1.1rem;
    transition: transform 0.2s ease;
    display: inline-block; /* 회전 애니메이션을 위해 필요 */
}

.custom-details[open] .details-summary::before {
    content: '📂'; /* 열렸을 때 아이콘 변경 */
    transform: rotate(0deg); /* 이모지는 90도 회전보다 아이콘 자체를 바꾸는 게 예뻐요 */
}

.details-content {
    padding: 16px;
    background-color: #fff;
}

/* 내부 코드 블럭 여백 조정 */
.details-content pre {
    margin: 0;
}
</style>
